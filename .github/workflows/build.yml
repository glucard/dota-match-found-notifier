name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: sudo apt-get update && sudo apt-get install -y python3-tk
      - run: uv sync --extra wayland --group dev
      - run: uv run ruff check src/
      - run: uv run pytest -q

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: d2kit-linux
            binary: d2kit
            extra: "--extra wayland"
            collect: "--collect-all pipewire_capture"
          - os: windows-latest
            artifact: d2kit-windows
            binary: d2kit.exe
            extra: ""
            collect: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      # Linux needs Tk available so PyInstaller bundles _tkinter for the wizard.
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - run: uv sync ${{ matrix.extra }} --group dev

      - name: Build single-file binary
        run: >
          uv run pyinstaller --onefile --name d2kit
          --collect-submodules prompt_toolkit --collect-submodules questionary
          --collect-all pydantic
          ${{ matrix.collect }}
          pyi_entry.py

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.binary }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
